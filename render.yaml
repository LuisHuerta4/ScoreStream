services:
  - type: web
    name: scorestream
    runtime: node
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install
    startCommand: node backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ARCJET_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ARCJET_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false